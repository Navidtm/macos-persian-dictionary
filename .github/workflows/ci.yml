name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Validate word entries
        run: python3 scripts/validate.py

      - name: Build dictionary XML
        run: python3 scripts/build.py

      - name: Run test suite
        run: python3 -m unittest discover -s tests -v
